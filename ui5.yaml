specVersion: "4.0"
metadata:
  name: com.sap.btp.zcurdapp.zopa
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /V2
            url: https://services.odata.org
        # UI5 section removed — let karma-ui5 handle CDN loading directly
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon